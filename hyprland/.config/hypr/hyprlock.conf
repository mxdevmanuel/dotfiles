general {
    hide_cursor         = true
    grace               = 5
    no_fade_in          = false
    disable_loading_bar = false
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.6
}

input-field {
    monitor          =
    size             = 280, 52
    outline_thickness = 2
    dots_size        = 0.2
    dots_spacing     = 0.2
    dots_center      = true
    outer_color      = rgba(0, 0, 0, 0)
    inner_color      = rgba(0, 0, 0, 0.5)
    font_color       = rgb(200, 200, 200)
    fade_on_empty    = false
    placeholder_text = <i>Password</i>
    check_color      = rgb(204, 136, 34)
    fail_color       = rgb(204, 34, 34)
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color   = rgb(255, 170, 0)
    position         = 0, -80
    halign           = center
    valign           = center
}

label {
    monitor     =
    text        = $TIME
    color       = rgba(220, 220, 220, 1.0)
    font_size   = 72
    font_family = monospace
    position    = 0, 160
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = $LAYOUT
    color       = rgba(180, 180, 180, 0.8)
    font_size   = 14
    font_family = monospace
    position    = 0, -140
    halign      = center
    valign      = center
}
