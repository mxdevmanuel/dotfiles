# Hyprland config — Monokai theme, mirrors sway keybinds.
# Refs: https://wiki.hyprland.org/Configuring/

# ===== Monitors =====================================================
# `preferred` resolution, auto position, scale 1
monitor = eDP-1, preferred, auto, 1.5
monitor = DP-3,  1920x1080, 1920x0, 1
monitor = HDMI-A-2, 1920x1080, 0x0, 1
monitor = , preferred, auto, 1

# ===== Vars =========================================================
$mod  = SUPER
$term = foot
$WOBSOCK = /tmp/wob.sock

# Workspace icons live in waybar config; we keep numeric workspaces here.

# ===== Autostart ====================================================
exec-once = mako
exec-once = hypridle
exec-once = waybar
exec-once = wl-paste --watch cliphist store
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target

# ===== Input ========================================================
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click   = true
    }
    sensitivity = 0
}

# ===== General ======================================================
general {
    gaps_in  = 5
    gaps_out = 5
    border_size = 2
    # Monokai: green focus, dark inactive
    col.active_border   = rgba(a6e22eff)
    col.inactive_border = rgba(49483eff)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    drop_shadow = false
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    animation = windows,     1, 4, easeOutQuint, slide
    animation = windowsOut,  1, 3, easeOutQuint, slide
    animation = fade,        1, 4, easeOutQuint
    animation = workspaces,  1, 4, easeOutQuint, slide
    animation = border,      1, 4, easeOutQuint
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
}

# Avoid XWayland
xwayland {
    enabled = false
}

# ===== Window rules =================================================
windowrulev2 = workspace 2 silent, class:^(google-chrome)$
windowrulev2 = workspace 2 silent, class:^(chromium)$
windowrulev2 = workspace 2 silent, class:^(firefox)$
windowrulev2 = workspace 3 silent, class:^(neovide)$
windowrulev2 = workspace 5 silent, class:^(thunar)$
windowrulev2 = workspace 5 silent, title:^(vifm)$
windowrulev2 = workspace 6 silent, class:^(mpv)$
windowrulev2 = workspace 7 silent, class:^(transmission-gtk)$
windowrulev2 = workspace 8 silent, class:^(gnumeric)$

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(qjackctl)$
windowrulev2 = float, class:^(Gpick)$
windowrulev2 = float, class:^(unicodepicker)$
windowrulev2 = float, class:^(scratch)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$

# ===== Keybinds =====================================================
# Top row
bind = $mod SHIFT, escape, exec, poweroptions.sh
bind = $mod, minus, exec, pkill -USR1 pomodoro.sh
bind = $mod, grave, exec, wofi --show window
bind = $mod, F2, exec, wofi --show run
bind = $mod, F6, exec, $term ssh $(grep "ssh" ~/.zsh_history | grep -Eo "[a-z0-9]+?@?([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)" | uniq | wofi --dmenu)
bind = $mod, F9, pin
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | tee /tmp/$(date +%m-%d-%Y_%Hh%Mm%Ss).png | wl-copy
bind = $mod, Next, workspace, e+1
bind = $mod, Prior, workspace, e-1
bind = $mod, Home, exec, wf-recorder -g "$(slurp)" -f ~/Documents/$(date +%m-%d-%Y_%H-%M-%S).mp4
bind = $mod, End, exec, pkill -SIGINT wf-recorder && notify-send "Screen record saved" -t 2000

# Second row
bind = $mod, tab, workspace, previous
bind = $mod SHIFT, q, killactive
bind = $mod, w, layoutmsg, preselect d
bind = $mod, e, togglesplit
bind = $mod SHIFT, r, exec, hyprctl reload
bind = $mod, t, exec, $term -e bash
bind = $mod SHIFT, t, exec, env NOTMUX=1 $term
bind = $mod, o, exec, makoctl dismiss
bind = $mod SHIFT, o, exec, makoctl dismiss --all
bind = $mod, braceleft, movecurrentworkspacetomonitor, l
bind = $mod, braceright, movecurrentworkspacetomonitor, r

# Home row
bind = $mod, s, togglefloating
bind = $mod, d, exec, wofi --show drun
bind = $mod, f, fullscreen, 0
bind = $mod SHIFT, f, workspace, 5
bind = $mod SHIFT, f, exec, $term vifm
bind = $mod, return, exec, $term

# Shift row
bind = $mod, z, exec, $HOME/.local/bin/tmux-session-selector.sh
bind = $mod, x, togglesplit
bind = $mod, c, exec, wofi --show calc -modi calc -no-show-match -no-sort
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod, v, exec, pavucontrol
bind = $mod, n, exec, $term nvim
bind = $mod, less, exec, $term --class unicodepicker unicodepicker.sh
bind = $mod, greater, exec, emoji.sh

# Bottom row
bind = $mod SHIFT, space, togglefloating

# Focus movement (vim keys + arrows)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r

# Move active window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Workspaces 1-10 (0 == 10)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Audio
bindl = , XF86AudioRaiseVolume, exec, $HOME/.local/bin/sink-smart-selector-v2.sh +5%
bindl = , XF86AudioLowerVolume, exec, $HOME/.local/bin/sink-smart-selector-v2.sh -5%
bindl = , XF86AudioMute, exec, $HOME/.local/bin/sink-smart-selector-v2.sh mute
bindl = , XF86AudioMicMute, exec, pactl set-source-mute $(pactl get-default-source) toggle

# Brightness
bindle = , XF86MonBrightnessUp,   exec, light -A 5
bindle = , XF86MonBrightnessDown, exec, light -U 5

# Media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Resize submap (hyprland uses submaps for sway-like modes)
bind = $mod, r, submap, resize
submap = resize
binde = , h, resizeactive, -10 0
binde = , j, resizeactive,   0 10
binde = , k, resizeactive,   0 -10
binde = , l, resizeactive,  10 0
binde = , left,  resizeactive, -10 0
binde = , down,  resizeactive,   0 10
binde = , up,    resizeactive,   0 -10
binde = , right, resizeactive,  10 0
bind  = , return, submap, reset
bind  = , escape, submap, reset
submap = reset

# Gaps submap
bind = $mod, g, submap, gaps
submap = gaps
binde = , plus,  exec, hyprctl keyword general:gaps_in  $((`hyprctl getoption general:gaps_in  -j | jq .custom | tr -d '"' | awk '{print $1}'` + 1))
binde = , minus, exec, hyprctl keyword general:gaps_in  $((`hyprctl getoption general:gaps_in  -j | jq .custom | tr -d '"' | awk '{print $1}'` - 1))
bind  = , 0,     exec, hyprctl keyword general:gaps_in 0
bind  = , return, submap, reset
bind  = , escape, submap, reset
submap = reset

# Backlight submap
bind = $mod, F4, submap, light
submap = light
binde = , plus,  exec, light -A 5
binde = , minus, exec, light -U 5
bind  = , return, submap, reset
bind  = , escape, submap, reset
submap = reset

# ===== Wallpaper ====================================================
# Set with hyprpaper or swaybg; uncomment one below
# exec-once = hyprpaper
# exec-once = swaybg -i $HOME/.local/share/wallpapers/monokai.png -m fill

# ===== Env ==========================================================
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = GDK_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
