# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Use C-b as prefix over SSH so nested sessions stay reachable
if-shell '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]' {
    set -g prefix C-b
    unbind C-a
    bind C-b send-prefix
}

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g set-titles on
set -g status on
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -g default-command "$SHELL"
set-option -sa terminal-features ',xterm-kitty:RGB'

# ── Copy mode ─────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Key bindings ──────────────────────────────────────────────────────────────
# Pane navigation (vim-style)
unbind l
bind-key -r -T prefix h select-pane -L
bind-key -r -T prefix j select-pane -D
bind-key -r -T prefix k select-pane -U
bind-key -r -T prefix l select-pane -R

# Pane resizing
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Last active window
bind-key Tab last-window

# Windows — open in current path by default
bind-key c new-window -c '#{pane_current_path}'
bind-key b new-window
bind-key '"' split-window -c '#{pane_current_path}'
bind-key % split-window -h -c '#{pane_current_path}'

# Popups
bind-key F2 command-prompt -p command "display-popup -E %%'"
bind-key F3 display-popup -E 'bluetoothctl'
bind-key F4 display-popup -E 'pulsemixer'
bind-key F8 display-popup

# ── Appearance ────────────────────────────────────────────────────────────────
set -g @themepack 'basic'
set -g @theme-display-panes-active-colour yellow
set -g @theme-display-panes-colour cyan
set -g @theme-window-status-current-bg cyan

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jimeh/tmux-themepack'

run -b '~/.tmux/plugins/tpm/tpm'
