# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Use C-b as prefix over SSH so nested sessions stay reachable
if-shell '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]' {
    set -g prefix C-b
    unbind C-a
    bind C-b send-prefix
}

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g set-titles on
set -g status on
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -g default-command "$SHELL"
set-option -sa terminal-features ',xterm-kitty:RGB'

# ── Copy mode ─────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Key bindings ──────────────────────────────────────────────────────────────
# Pane navigation (vim-style)
unbind l
bind-key -r -T prefix h select-pane -L
bind-key -r -T prefix j select-pane -D
bind-key -r -T prefix k select-pane -U
bind-key -r -T prefix l select-pane -R

# Pane resizing
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Last active window
bind-key Tab last-window

# Windows — open in current path by default
bind-key c new-window -c '#{pane_current_path}'
bind-key b new-window
bind-key '"' split-window -c '#{pane_current_path}'
bind-key % split-window -h -c '#{pane_current_path}'

# Popups
bind-key F2 command-prompt -p command "display-popup -E %%'"
bind-key F3 display-popup -E 'bluetoothctl'
bind-key F4 display-popup -E 'pulsemixer'
bind-key F8 display-popup

# ── Appearance (Catppuccin Macchiato) ─────────────────────────────────────────
set -g status-style          "bg=#24273a,fg=#cad3f5"
set -g status-justify        centre
set -g status-left           "#[fg=#c6a0f6,bg=#24273a]#[bold,fg=#24273a,bg=#c6a0f6]  #S #[fg=#c6a0f6,bg=#24273a] "
set -g status-left-length    40
set -g status-right          "#[fg=#a6da95,bg=#24273a]#[bold,fg=#24273a,bg=#a6da95]  %H:%M #[fg=#a6da95,bg=#24273a]  #[fg=#8bd5ca,bg=#24273a]#[bold,fg=#24273a,bg=#8bd5ca]  %d %b #[fg=#8bd5ca,bg=#24273a]  #[fg=#8aadf4,bg=#24273a]#[bold,fg=#24273a,bg=#8aadf4]  #H #[fg=#8aadf4,bg=#24273a]"
set -g status-right-length   80
set -g window-status-style         "fg=#6e738d,bg=#24273a"
set -g window-status-current-style "none"
set -g window-status-format         "  #I #W  "
set -g window-status-current-format "#[fg=#363a4f,bg=#24273a]#[bold,fg=#c6a0f6,bg=#363a4f]  #I #W #[fg=#363a4f,bg=#24273a]"
set -g window-status-separator      ""
set -g message-style         "bg=#363a4f,fg=#cad3f5"
set -g pane-border-style        "fg=#24273a"
set -g pane-active-border-style "fg=#c6a0f6"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

run -b '~/.tmux/plugins/tpm/tpm'
